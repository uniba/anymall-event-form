services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: anymall
      POSTGRES_PASSWORD: anymall
      POSTGRES_DB: anymall_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anymall -d anymall_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
